# Video Analizier is the fallback HTTP vhost for the shared OVH VPS.
# Existing named vhosts (api.investtracker.eu and api.policzalne.pl) continue
# to win nginx's exact server_name matching. Vercel's external rewrite and
# direct-IP requests land here regardless of the Host header Vercel forwards.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
