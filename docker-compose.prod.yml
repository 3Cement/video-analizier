# Produkcyjny stack na VPS: api + worker + Caddy (automatyczne HTTPS).
# Użycie:
#   DOMAIN=twoja-domena.pl docker compose -f docker-compose.prod.yml up -d --build
# Bez domeny (goły adres IP, HTTP na porcie 80):
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  api:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - MEDIA_DIR=/app/data/media
      - DATABASE_URL=sqlite:////app/data/app.db
      - WORKER_MODE=true
      - CAPTIONS_FIRST=true
      - JOB_MAX_WORKERS=2
    depends_on:
      - worker

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - MEDIA_DIR=/app/data/media
      - DATABASE_URL=sqlite:////app/data/app.db
      - WORKER_MODE=true
      - CAPTIONS_FIRST=true

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
