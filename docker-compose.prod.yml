services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes: ["ollama_data:/root/.ollama"]
    environment:
      OLLAMA_CONTEXT_LENGTH: "8192"
      OLLAMA_KEEP_ALIVE: "2m"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
    mem_limit: 5g
    cpus: 3.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      app_net:
        ipv4_address: 172.28.0.5

  ollama-pull:
    image: ollama/ollama:latest
    restart: "no"
    command: ["pull", "${OLLAMA_MODEL:-qwen3:4b-instruct}"]
    volumes: ["ollama_data:/root/.ollama"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks: [app_net]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: [.env]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-video_analizier}
      POSTGRES_USER: ${POSTGRES_USER:-video_analizier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-video_analizier} -d ${POSTGRES_DB:-video_analizier}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      app_net:
        ipv4_address: 172.28.0.2

  api:
    build: .
    restart: unless-stopped
    expose: ["8000"]
    env_file: [.env]
    volumes: ["app_data:/app/data"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-video_analizier}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-video_analizier}
      DATA_DIR: /app/data
      MEDIA_DIR: /app/data/media
      WORKER_MODE: "true"
      AUTH_REQUIRED: "true"
      COOKIE_SECURE: "true"
      TRUSTED_PROXY_IPS: 172.28.0.4
      SINGLE_USER_EMAIL: ${SINGLE_USER_EMAIL:?SINGLE_USER_EMAIL is required}
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b-instruct}
    depends_on:
      postgres:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      app_net:
        ipv4_address: 172.28.0.3

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    env_file: [.env]
    volumes: ["app_data:/app/data"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-video_analizier}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-video_analizier}
      DATA_DIR: /app/data
      MEDIA_DIR: /app/data/media
      WORKER_MODE: "true"
      AUTH_REQUIRED: "true"
      JOB_MAX_WORKERS: "1"
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b-instruct}
    depends_on:
      api:
        condition: service_healthy
    networks: [app_net]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_BIND:-0.0.0.0:80}:80"
      - "${CADDY_HTTPS_BIND:-0.0.0.0:443}:443"
    environment: ["DOMAIN=${DOMAIN:?DOMAIN is required}"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    networks:
      app_net:
        ipv4_address: 172.28.0.4

volumes:
  ollama_data:
  postgres_data:
  app_data:
  caddy_data:
  caddy_config:

networks:
  app_net:
    ipam:
      config: [{subnet: 172.28.0.0/24}]
