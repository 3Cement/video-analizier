services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - MEDIA_DIR=/app/data/media
      - DATABASE_URL=sqlite:////app/data/app.db
      - WORKER_MODE=true
      - CAPTIONS_FIRST=true
      - JOB_MAX_WORKERS=2
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      - worker

  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - MEDIA_DIR=/app/data/media
      - DATABASE_URL=sqlite:////app/data/app.db
      - WORKER_MODE=true
      - CAPTIONS_FIRST=true
