services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - MEDIA_DIR=/app/data/media
      - DATABASE_URL=sqlite:////app/data/app.db
      - WORKER_MODE=false

  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - MEDIA_DIR=/app/data/media
      - DATABASE_URL=sqlite:////app/data/app.db
      - WORKER_MODE=true
    profiles:
      - worker
