services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: video_analizier
      POSTGRES_USER: video_analizier
      POSTGRES_PASSWORD: video_analizier
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video_analizier -d video_analizier"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    ports: ["8000:8000"]
    env_file: [.env]
    volumes: ["app_data:/app/data"]
    environment:
      DATABASE_URL: postgresql+psycopg://video_analizier:video_analizier@postgres/video_analizier
      DATA_DIR: /app/data
      MEDIA_DIR: /app/data/media
      WORKER_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    env_file: [.env]
    volumes: ["app_data:/app/data"]
    environment:
      DATABASE_URL: postgresql+psycopg://video_analizier:video_analizier@postgres/video_analizier
      DATA_DIR: /app/data
      MEDIA_DIR: /app/data/media
      WORKER_MODE: "true"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  app_data:
